<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清单 · TodoList</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        .task-item:active {
            opacity: 0.5;
        }

        :root {
            --primary-bg: #faf8f3;
            --card-bg: #ffffff;
            --text-primary: #2c2416;
            --text-secondary: #6b6658;
            --accent: #d4a574;
            --accent-dark: #b8895e;
            --completed: #a8b5a0;
            --border: #e8e4db;
            --shadow-sm: 0 2px 8px rgba(44, 36, 22, 0.06);
            --shadow-md: 0 8px 24px rgba(44, 36, 22, 0.12);
            --shadow-lg: 0 16px 48px rgba(44, 36, 22, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--primary-bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(212, 165, 116, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 181, 160, 0.06) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 580px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .input-section {
            background: var(--card-bg);
            padding: 28px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            margin-bottom: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .input-section:hover {
            box-shadow: var(--shadow-lg);
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        #taskInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--text-primary);
            background: var(--primary-bg);
            transition: all 0.3s ease;
        }

        #taskInput:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(212, 165, 116, 0.1);
        }

        #taskInput::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        #addBtn {
            padding: 14px 32px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Noto Sans SC', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(212, 165, 116, 0.3);
        }

        #addBtn:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(212, 165, 116, 0.4);
        }

        #addBtn:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        #taskList {
            list-style: none;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease-out;
            background: var(--card-bg);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: var(--primary-bg);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            margin-right: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            position: relative;
        }

        .task-checkbox:hover {
            background: rgba(212, 165, 116, 0.1);
            transform: scale(1.1);
        }

        .task-item.completed .task-checkbox {
            background: var(--completed);
            border-color: var(--completed);
        }

        .task-item.completed .task-checkbox::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .task-text {
            flex: 1;
            font-size: 1rem;
            color: var(--text-primary);
            transition: all 0.3s ease;
            word-break: break-word;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .delete-btn {
            padding: 8px 16px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .task-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: #f5e6e6;
            color: #c94545;
            border-color: #c94545;
        }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 1.1rem;
            font-weight: 300;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }

            .input-group {
                flex-direction: column;
            }

            #addBtn {
                width: 100%;
            }

            .stats {
                gap: 8px;
            }

            .stat-number {
                font-size: 1.3rem;
            }

            .stat-label {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>清单</h1>
            <p class="subtitle">记录生活，完成目标</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="今天要做什么？" autocomplete="off">
                <button id="addBtn">添加</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalTasks">0</span>
                <span class="stat-label">总任务</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="completedTasks">0</span>
                <span class="stat-label">已完成</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="pendingTasks">0</span>
                <span class="stat-label">待完成</span>
            </div>
        </div>

        <ul id="taskList">
            <div class="empty-state">
                <div class="empty-icon">📝</div>
                <p class="empty-text">暂无任务，开始添加吧！</p>
            </div>
        </ul>
    </div>

    <script>

        // 获取DOM元素
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const totalTasksEl = document.getElementById('totalTasks');
        const completedTasksEl = document.getElementById('completedTasks');
        const pendingTasksEl = document.getElementById('pendingTasks');

        // 任务数组
        let tasks = [];
        let dragTaskId = null;
        // 从localStorage加载任务
        function loadTasks() {
            const savedTasks = localStorage.getItem('todoTasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
                renderTasks();
            }
        }

        // 保存任务到localStorage
        function saveTasks() {
            localStorage.setItem('todoTasks', JSON.stringify(tasks));
        }

        // 添加任务
        function addTask() {
            const taskText = taskInput.value.trim();

            if (taskText === '') {
                taskInput.focus();
                return;
            }

            const task = {
                id: Date.now(),
                text: taskText,
                completed: false
            };

            tasks.push(task);
            saveTasks();
            renderTasks();
            taskInput.value = '';
            taskInput.focus();
        }

        // 切换任务完成状态
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
            }
        }

        // 删除任务
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
        }

        // 更新统计数据
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            totalTasksEl.textContent = total;
            completedTasksEl.textContent = completed;
            pendingTasksEl.textContent = pending;
        }

        // 渲染任务列表
        function renderTasks() {
            taskList.innerHTML = '';

            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p class="empty-text">暂无任务，开始添加吧！</p>
                    </div>
                `;
            } else {
                tasks.forEach(task => {
                    const li = document.createElement('li');
                    li.className = `task-item ${task.completed ? 'completed' : ''}`;
                    li.draggable = true;

                    li.innerHTML = `
                        <div class="task-checkbox" data-id="${task.id}"></div>
                        <span class="task-text">${escapeHtml(task.text)}</span>
                        <button class="delete-btn" data-id="${task.id}">删除</button>
                        
                    `;
                    // 开始拖动
                    li.addEventListener('dragstart', () => {
                        dragTaskId = task.id;
                    });

                    // 允许拖放
                    li.addEventListener('dragover', (e) => {
                        e.preventDefault();
                    });

                    // 放下时改变顺序
                    li.addEventListener('drop', () => {

                        const targetId = task.id;

                        const dragIndex = tasks.findIndex(t => t.id === dragTaskId);
                        const targetIndex = tasks.findIndex(t => t.id === targetId);

                        const draggedTask = tasks.splice(dragIndex, 1)[0];
                        tasks.splice(targetIndex, 0, draggedTask);

                        saveTasks();
                        renderTasks();

                    });
                    taskList.appendChild(li);
                });
            }

            updateStats();
        }

        // 转义HTML，防止XSS攻击
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 事件监听 - 添加按钮
        addBtn.addEventListener('click', addTask);

        // 事件监听 - 回车键
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // 事件委托 - 任务列表点击
        taskList.addEventListener('click', (e) => {
            if (e.target.classList.contains('task-checkbox')) {
                const id = parseInt(e.target.dataset.id);
                toggleTask(id);
            }

            if (e.target.classList.contains('delete-btn')) {
                const id = parseInt(e.target.dataset.id);
                deleteTask(id);
            }
        });

        // 页面加载时初始化
        loadTasks();
    </script>
</body>

</html>
